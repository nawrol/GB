<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title></title>
  
  <style>
    body { background-color: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
    .widgets-wrapper { display: flex; flex-wrap: wrap; gap: 20px; }
    .widget-column { flex: 1; min-width: 320px; }
  </style>

  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
</head>
<body>

  <div class="widgets-wrapper">
    <div class="widget-column">
      <api-sports-widget data-type="leagues"></api-sports-widget>
    </div>

    <div class="widget-column" id="wg-games">
      <api-sports-widget data-type="games"></api-sports-widget>
    </div>

    <div class="widget-column">
      <div id="wg-game"></div>
      <div id="wg-team" style="margin-top: 20px;"></div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="dark" 
    data-show-logos="true" 
    data-target-league="#wg-games" 
    data-target-game="#wg-game" 
    data-target-team="#wg-team">
  </api-sports-widget>

</body>
</html>
