<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Beans Score • Predykcje</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body class="bg-dark text-light">
  <nav class="navbar navbar-expand-lg bg-dark shadow-sm sticky-top border-bottom border-success">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-success" href="/">GREEN BEANS SCORE</a>
      <div>
        <a href="#" class="btn btn-outline-success mx-1">Dzisiaj</a>
        <a href="#" class="btn btn-success mx-1">Predykcje</a>
        <a href="#" class="btn btn-outline-success mx-1">Tabele</a>
      </div>
      <a href="https://www.siepomaga.pl/" target="_blank" class="btn btn-danger">POMAGAMY !!</a>
    </div>
  </nav>

  <div class="container-fluid content p-3">
    <div class="row g-3">

      <!-- Lewa kolumna -->
      <div class="col-lg-3">
        <div class="card bg-dark border-success mb-3">
          <div class="card-header bg-success">Ligi</div>
          <div class="card-body p-0"><api-sports-widget data-type="leagues"></api-sports-widget></div>
        </div>

        <div class="card bg-dark border-success">
          <div class="card-header bg-success">Tabela</div>
          <div class="card-body p-0"><api-sports-widget data-type="standings"></api-sports-widget></div>
        </div>
      </div>

      <!-- Główna sekcja - Predykcje -->
      <div class="col-lg-6">
        <div class="card bg-dark border-success mb-4">
          <div class="card-header bg-success">🔥 Najlepsze Predykcje Dnia</div>
          <div class="card-body p-0">
            <api-sports-widget data-type="games" data-show-predictions="true"></api-sports-widget>
          </div>
        </div>

        <div class="card bg-dark border-success">
          <div class="card-header bg-success">Dzisiejsze Mecze</div>
          <div class="card-body p-0">
            <api-sports-widget data-type="games"></api-sports-widget>
          </div>
        </div>
      </div>

      <!-- Prawa kolumna -->
      <div class="col-lg-3">
        <div class="card bg-dark border-success mb-3">
          <div class="card-header bg-success">H2H</div>
          <div class="card-body p-0"><api-sports-widget data-type="h2h"></api-sports-widget></div>
        </div>

        <div class="card bg-dark border-success">
          <div class="card-header bg-success">Value Bets</div>
          <div class="card-body" id="value-bets">
            <p class="text-muted text-center">Ładowanie value bets...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="dark" 
    data-odds="true"
    data-odds-provider="all"
    data-show-predictions="true"
    data-show-logos="true" 
    data-refresh="20" 
    data-target-game="modal"
    data-target-team="modal">
  </api-sports-widget>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
