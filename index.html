<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>API‑FOOTBALL Widgets</title>

  <!-- Oficjalny loader widgetów -->
  <script type="module" src="https://widgets.api-sports.io/football/1.1.8/widget.js"></script>
</head>
<body>

  <!-- KONFIG WIDGETÓW -->
  <div id="wg-api-football-config"
       data-host="v3.football.api-sports.io"
       data-key="TWÓJ_KLUCZ_API"
       data-theme="dark"
       data-refresh="60"
       data-lang="pl">
  </div>

  <!-- PRZYKŁADOWE WIDGETY zgodnie z dokumentacją -->
  <div data-type="livescore"></div>
  <div data-type="games"></div>
  <div data-type="standings" data-league="39" data-season="2024"></div>
  <div data-type="topscorers" data-league="39" data-season="2024"></div>

</body>
</html>
