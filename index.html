<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centrum Piłkarskie</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>
  <nav class="header navbar navbar-expand-lg bg-body-tertiary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">WIDGETY PIŁKARSKIE</a>
    </div>
  </nav>

  <div class="content p-3">
    <div class="row">
      
      <div class="col-12 col-md-3 mb-3">
        <div id="leagues-list" class="card text-bg-dark border-dark">
          <div class="card-header text-center fw-bold">Wybierz Ligę</div>
          <div class="card-body p-0">
            <api-sports-widget data-type="leagues"></api-sports-widget>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-md-5 mb-3">
        <div id="games-list-container" class="card text-bg-dark border-dark">
          <div class="card-header text-center fw-bold">Mecze</div>
          <div class="card-body p-0">
            <div id="games-list">
              <api-sports-widget data-type="games"></api-sports-widget>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-md-4 mb-3">
        
        <div class="card text-bg-dark border-dark mb-3">
          <div class="card-header text-center fw-bold">Tabela Ligowa</div>
          <div class="card-body p-0">
            <div id="standings-content">
               </div>
          </div>
        </div>
        
        <div class="card text-bg-dark border-dark mb-3">
          <div class="card-header text-center fw-bold">Informacje o drużynie</div>
          <div class="card-body p-0">
            <div id="team-content">
               </div>
          </div>
        </div>

        <div id="game-content" class="card text-bg-dark border-dark">
          <div class="card-header text-center fw-bold">Szczegóły meczu</div>
          <div class="card-body p-0">
             <api-sports-widget data-type="game"></api-sports-widget>
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="TWÓJ_KLUCZ_API_TUTAJ" 
    data-lang="pl" 
    data-theme="grey" 
    data-show-error="false" 
    data-show-logos="true" 
    data-refresh="20" 
    data-favorite="true" 
    data-player-trophies="true" 
    data-standings="true" 
    data-player-injuries="true" 
    data-team-squad="true" 
    data-team-statistics="true" 
    data-player-statistics="true" 
    data-tab="games" 
    data-game-tab="statistics" 
    data-target-player="modal" 
    data-target-league="#games-list" 
    data-target-team="#team-content" 
    data-target-game="#game-content .card-body" 
    data-target-standings="#standings-content">
  </api-sports-widget>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
