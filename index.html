<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Beans Score • Predykcje</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body class="bg-dark text-light">
  <nav class="navbar navbar-expand-lg bg-dark shadow-sm sticky-top border-bottom border-success">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-success" href="/">GREEN BEANS SCORE</a>
      <a href="https://www.siepomaga.pl/" target="_blank" class="btn btn-danger fw-bold">POMAGAMY !!</a>
    </div>
  </nav>

  <div class="container-fluid content p-3">
    <div class="row g-3">
      <!-- Lewa -->
      <div class="col-lg-3">
        <div class="card bg-dark border-success mb-3">
          <div class="card-header bg-success">Wybierz Ligę</div>
          <div class="card-body p-0"><api-sports-widget data-type="leagues"></api-sports-widget></div>
        </div>
      </div>

      <!-- Główna -->
      <div class="col-lg-6">
        <div class="card bg-dark border-success mb-4">
          <div class="card-header bg-success">Dzisiejsze Mecze</div>
          <div class="card-body p-0">
            <div id="games-list"><api-sports-widget data-type="games"></api-sports-widget></div>
          </div>
        </div>
      </div>

      <!-- Prawa - Predykcje -->
      <div class="col-lg-3">
        <div class="card bg-dark border-success">
          <div class="card-header bg-success">🔥 Najlepsze Predykcje</div>
          <div class="card-body" id="value-bets">
            <p class="text-center text-muted">Ładowanie predykcji...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="matchModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content bg-dark text-light border-success">
        <div class="modal-header border-success">
          <h5 class="modal-title" id="modalTitle">Szczegóły meczu</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="dark" 
    data-show-logos="true" 
    data-refresh="20" 
    data-favorite="true"
    data-target-game="modal"
    data-target-team="modal"
    data-target-player="modal">
  </api-sports-widget>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
