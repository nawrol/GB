<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mój Livescore</title>
  <script src="https://widgets.api-sports.io/football.js"></script>

  <style>
    body { 
      background: #0f0f0f; 
      color: #eee; 
      font-family: Arial, sans-serif; 
      padding: 20px; 
      margin: 0; 
    }
    h1 { text-align: center; margin: 30px 0; }
    .box { 
      background: #1a1a1a; 
      padding: 15px; 
      border-radius: 12px; 
      margin: 20px 0; 
    }
  </style>
</head>
<body>

  <h1>⚽ Mój Piłkarski Livescore</h1>

  <!-- CONFIG -->
  <api-sports-widget
    data-type="config"
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5"
    data-sport="football"
    data-lang="pl"
    data-theme="dark"
    data-refresh="15"
    data-show-errors="true"
  ></api-sports-widget>

  <div class="box">
    <h2>Dzisiaj</h2>
    <api-sports-widget data-type="games"></api-sports-widget>
  </div>

  <div class="box">
    <h2>Ekstraklasa - Tabela</h2>
    <api-sports-widget 
      data-type="standings" 
      data-league="62" 
      data-season="2025">
    </api-sports-widget>
  </div>

</body>
</html>
