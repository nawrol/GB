<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centrum Piłkarskie - Statystyki i Wyniki</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>

  <nav class="header navbar navbar-expand-lg bg-body-tertiary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-success" href="#">⚽ GLOBALNE CENTRUM PIŁKARSKIE</a>
    </div>
  </nav>

  <div class="content p-3">
    <div class="row">
      
      <div class="col-12 col-lg-3 mb-4">
        <div id="leagues-list" class="card text-bg-dark border-dark shadow">
          <div class="card-header text-center fw-bold bg-secondary text-white">Wybierz Rozgrywki</div>
          <div class="card-body p-0">
            <api-sports-widget data-type="leagues"></api-sports-widget>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-lg-5 mb-4">
        <div id="games-list-container" class="card text-bg-dark border-dark shadow mb-4">
          <div class="card-header text-center fw-bold bg-secondary text-white">Terminarz i Wyniki</div>
          <div class="card-body p-0">
            <div id="games-list">
              <api-sports-widget data-type="games"></api-sports-widget>
            </div>
          </div>
        </div>

        <div class="card text-bg-dark border-dark shadow">
          <div class="card-header text-center fw-bold bg-danger text-white">🔴 MECZE NA ŻYWO (LIVESCORES)</div>
          <div class="card-body p-0">
            <api-sports-widget data-type="livescores"></api-sports-widget>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-lg-4 mb-4">
        
        <div class="card text-bg-dark border-dark shadow mb-4">
          <div class="card-header text-center fw-bold bg-primary text-white">Tabela Ligowa</div>
          <div class="card-body p-0">
            <div id="standings-content"></div>
          </div>
        </div>

        <div class="card text-bg-dark border-dark shadow mb-4">
          <div class="card-header text-center fw-bold bg-warning text-dark">🔮 Prognozy i Analizy (Predictions)</div>
          <div class="card-body p-0">
            <div id="predictions-content">
              <api-sports-widget data-type="predictions" data-game-id=""></api-sports-widget>
            </div>
          </div>
        </div>
        
        <div class="card text-bg-dark border-dark shadow mb-4">
          <div class="card-header text-center fw-bold bg-info text-dark">Informacje o Drużynie</div>
          <div class="card-body p-0">
            <div id="team-content"></div>
          </div>
        </div>

        <div id="game-content" class="card text-bg-dark border-dark shadow">
          <div class="card-header text-center fw-bold bg-success text-white">Statystyki Wybranego Meczu</div>
          <div class="card-body p-0">
             <api-sports-widget data-type="game"></api-sports-widget>
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="grey" 
    data-show-error="false" 
    data-show-logos="true" 
    data-refresh="20" 
    data-favorite="true" 
    data-player-trophies="true" 
    data-standings="true" 
    data-player-injuries="true" 
    data-team-squad="true" 
    data-team-statistics="true" 
    data-player-statistics="true" 
    data-tab="games" 
    data-game-tab="statistics" 
    data-target-player="modal" 
    data-target-league="#games-list" 
    data-target-team="#team-content" 
    data-target-game="#game-content .card-body" 
    data-target-standings="#standings-content">
  </api-sports-widget>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const gameWidget = document.querySelector('#game-content api-sports-widget');
      const predWidget = document.querySelector('#predictions-content api-sports-widget');

      if (gameWidget && predWidget) {
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'data-game-id') {
              const gameId = gameWidget.getAttribute('data-game-id');
              
              if (gameId) {
                predWidget.innerHTML = '';
                predWidget.setAttribute('data-game-id', gameId);
                
                if (typeof predWidget.connectedCallback === 'function') {
                  predWidget.connectedCallback();
                }
              }
            }
          });
        });

        observer.observe(gameWidget, { attributes: true });
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
