<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Beans Score</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body class="bg-dark text-light">

  <nav class="navbar navbar-expand-lg bg-dark shadow-sm sticky-top border-bottom border-success">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <a class="navbar-brand fw-bold text-success" href="/">GREEN BEANS SCORE</a>
      <a href="https://www.siepomaga.pl/" target="_blank" class="btn btn-danger fw-bold px-4">POMAGAMY !!</a>
    </div>
  </nav>

  <div class="content p-3">
    <div class="row">
      <div class="col-12 col-md-3 mb-3">
        <div class="card bg-dark border-success">
          <div class="card-header bg-success text-white text-center fw-bold">Wybierz Ligę</div>
          <div class="card-body p-0"><api-sports-widget data-type="leagues"></api-sports-widget></div>
        </div>
      </div>
      
      <div class="col-12 col-md-9 mb-3">
        <div class="card bg-dark border-success">
          <div class="card-header bg-success text-white text-center fw-bold">Dzisiejsze Mecze</div>
          <div class="card-body p-0">
            <div id="games-list">
              <api-sports-widget 
                data-type="games" 
                data-sport="football" 
                data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
                data-odds="true"
                data-odds-provider="8"
                data-show-predictions="true"
                data-show-h2h="true"
                data-show-standings="true"
                data-show-lineups="true"
                data-show-players="true"
                data-show-events="true"
                data-show-stats="true"
                data-target-game="modal">
              </api-sports-widget>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
