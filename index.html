<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bukmacherski Kokpit Tygrysa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>

  <nav class="header navbar navbar-expand-lg bg-body-tertiary sticky-top border-bottom border-success">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-success" href="#">⚽ TYGRYS ANALIZY - H2H & PROGNOZY</a>
    </div>
  </nav>

  <div class="content p-3">
    <div class="row">
      
      <div class="col-12 col-lg-3 mb-4">
        <div id="leagues-list" class="card text-bg-dark border-dark shadow">
          <div class="card-header text-center fw-bold bg-secondary text-white">Wybierz Rozgrywki</div>
          <div class="card-body p-0">
            <api-sports-widget data-type="leagues"></api-sports-widget>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-lg-5 mb-4">
        <div id="games-list-container" class="card text-bg-dark border-dark shadow mb-4">
          <div class="card-header text-center fw-bold bg-secondary text-white">Terminarz i Wyniki</div>
          <div class="card-body p-0">
            <div id="games-list">
              <api-sports-widget data-type="games"></api-sports-widget>
            </div>
          </div>
        </div>

        <div class="card text-bg-dark border-dark shadow">
          <div class="card-header text-center fw-bold bg-danger text-white">🔴 NA ŻYWO</div>
          <div class="card-body p-0 text-center">
            <api-sports-widget data-type="livescores"></api-sports-widget>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-lg-4 mb-4">
        
        <div class="card text-bg-dark border-dark shadow mb-4">
          <div class="card-header text-center fw-bold bg-primary text-white">Analiza H2H i Sędzia</div>
          <div id="custom-h2h-panel" class="card-body p-3">
            <p class="text-muted text-center m-0">Wybierz mecz, aby zobaczyć H2H i sędziego</p>
          </div>
        </div>

        <div class="card text-bg-dark border-dark shadow mb-4">
          <div class="card-header text-center fw-bold bg-warning text-dark">🔮 Prognozy i Typy AI</div>
          <div id="predictions-content" class="card-body p-0">
             <div class="p-3 text-muted text-center m-0">Wybierz mecz, aby zobaczyć predykcje</div>
          </div>
        </div>
        
        <div class="card text-bg-dark border-dark shadow mb-4">
          <div class="card-header text-center fw-bold bg-info text-dark">Informacje o Drużynie</div>
          <div class="card-body p-0">
            <div id="team-content"></div>
          </div>
        </div>

        <div id="game-content" class="card text-bg-dark border-dark shadow">
          <div class="card-header text-center fw-bold bg-success text-white">Szczegóły i Statystyki (Zakładka Statistics)</div>
          <div class="card-body p-0">
             <api-sports-widget data-type="game"></api-sports-widget>
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="grey" 
    data-show-error="false" 
    data-show-logos="true" 
    data-refresh="20" 
    data-favorite="true" 
    data-player-trophies="true" 
    data-player-injuries="true" 
    data-team-squad="true" 
    data-team-statistics="true" 
    data-player-statistics="true" 
    data-tab="games" 
    data-game-tab="statistics" 
    data-target-player="modal" 
    data-target-league="#games-list" 
    data-target-team="#team-content" 
    data-target-game="#game-content .card-body">
  </api-sports-widget>

  <script>
    const API_KEY = "f3c7ed02b7e08d0364bd2eb4f56ab2a5"; // <--- WKLEJ KLUCZ PONOWNIE TUTAJ

    document.addEventListener("DOMContentLoaded", function() {
      const gameContainer = document.querySelector('#game-content .card-body');
      let lastGameId = null;

      const observer = new MutationObserver(async function() {
        const gameWidget = gameContainer.querySelector('api-sports-widget');
        if (!gameWidget) return;

        const gameId = gameWidget.getAttribute('data-game-id');
        // Zabezpieczenie przed pobieraniem danych wielokrotnie przy jednym kliknięciu
        if (gameId && gameId !== lastGameId) {
          lastGameId = gameId;
          fetchExtraData(gameId);
        }
      });

      observer.observe(gameContainer, { childList: true, subtree: true, attributes: true });

      async function fetchExtraData(id) {
        const h2hPanel = document.getElementById('custom-h2h-panel');
        const predBox = document.getElementById('predictions-content');
        
        h2hPanel.innerHTML = '<div class="text-center text-info p-3">Pobieranie analizy...</div>';
        predBox.innerHTML = '<div class="text-center text-info p-3">Obliczanie szans...</div>';

        try {
          // 1. Pobieranie info o sędzim i ID drużyn
          const fixRes = await fetch(`https://v3.football.api-sports.io/fixtures?id=${id}`, {
            headers: { "x-apisports-key": API_KEY }
          });
          const fixData = await fixRes.json();
          const fixture = fixData.response[0];
          
          const sedzia = fixture.fixture.referee || "Brak danych";
          const team1 = fixture.teams.home;
          const team2 = fixture.teams.away;

          // 2. Pobieranie H2H (5 ostatnich spotkań)
          const h2hRes = await fetch(`https://v3.football.api-sports.io/fixtures/headtohead?h2h=${team1.id}-${team2.id}&last=5`, {
            headers: { "x-apisports-key": API_KEY }
          });
          const h2hData = await h2hRes.json();
          const matches = h2hData.response;

          // 3. Renderowanie panelu H2H
          let h2hHtml = `<div class="mb-3"><strong>👨‍⚖️ Sędzia:</strong> <span class="text-warning">${sedzia}</span></div>`;
          h2hHtml += `<h6>Ostatnie 5 starć H2H:</h6><ul class="list-group list-group-flush">`;
          
          matches.forEach(m => {
            const date = new Date(m.fixture.date).toLocaleDateString('pl-PL');
            h2hHtml += `
              <li class="list-group-item bg-dark text-white p-1 border-secondary" style="font-size: 0.85rem;">
                <small class="text-muted">${date}</small><br>
                ${m.teams.home.name} <strong class="text-info">${m.goals.home ?? '-'}:${m.goals.away ?? '-'}</strong> ${m.teams.away.name}
              </li>`;
          });
          h2hHtml += `</ul>`;
          h2hPanel.innerHTML = h2hHtml;

          // 4. Pobieranie danych dla Własnego Panelu Predykcji
          const predRes = await fetch(`https://v3.football.api-sports.io/predictions?fixture=${id}`, {
            headers: { "x-apisports-key": API_KEY }
          });
          const predData = await predRes.json();
          const pred = predData.response[0]?.predictions;

          if (pred) {
            predBox.innerHTML = `
              <div class="p-3">
                <div class="alert alert-success p-2 mb-3" style="font-size: 0.95rem;">
                  <strong>🎯 Algorytm poleca:</strong> <br> ${pred.advice}
                </div>
                <h6 class="mb-2">Procentowe szanse:</h6>
                <div class="progress mb-2 bg-dark border border-secondary" style="height: 30px; font-weight: bold; font-size: 0.9rem;">
                  <div class="progress-bar bg-primary" role="progressbar" style="width: ${pred.percent.home}" title="Gospodarze: ${pred.percent.home}">${pred.percent.home} (1)</div>
                  <div class="progress-bar bg-secondary text-white" role="progressbar" style="width: ${pred.percent.draw}" title="Remis: ${pred.percent.draw}">${pred.percent.draw} (X)</div>
                  <div class="progress-bar bg-danger" role="progressbar" style="width: ${pred.percent.away}" title="Goście: ${pred.percent.away}">${pred.percent.away} (2)</div>
                </div>
              </div>
            `;
          } else {
            predBox.innerHTML = '<div class="p-3 text-muted text-center">Brak predykcji bukmacherskich dla tego meczu.</div>';
          }

        } catch (err) {
          h2hPanel.innerHTML = '<div class="text-danger p-3">Wystąpił błąd podczas pobierania danych z API.</div>';
          predBox.innerHTML = '<div class="text-danger p-3">Wystąpił błąd podczas obliczania predykcji.</div>';
        }
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
