<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Beans Score</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

  <style>
    body { background-color: #121212; }
    .card { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; }
    .card-header { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    /* Paski przewijania dla dłuższych list */
    .scrollable-column { max-height: 90vh; overflow-y: auto; position: sticky; top: 10px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark mb-4 border-bottom border-success">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold text-success">Green Beans Score</span>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      
      <div class="col-12 col-lg-3 scrollable-column">
        <div class="card shadow">
          <div class="card-header bg-secondary text-white text-center">Rozgrywki</div>
          <div class="card-body p-0">
            <api-sports-widget data-type="leagues"></api-sports-widget>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-lg-5 scrollable-column">
        <div class="card shadow">
          <div class="card-header bg-dark text-white text-center">Terminarz</div>
          <div class="card-body p-0" id="games-container">
            <api-sports-widget data-type="games"></api-sports-widget>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-lg-4 scrollable-column">
        
        <div class="card shadow">
          <div class="card-header bg-success text-white text-center">Szczegóły Spotkania</div>
          <div class="card-body p-0" id="game-details-container">
            <api-sports-widget data-type="game"></api-sports-widget>
          </div>
        </div>

        <div class="card shadow mt-4">
          <div class="card-header bg-info text-dark text-center">Informacje o Drużynie</div>
          <div class="card-body p-0" id="team-details-container">
            <p class="text-center text-muted p-4">Kliknij w logo drużyny, aby załadować skład i statystyki.</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="dark" 
    data-show-logos="true" 
    data-target-league="#games-container" 
    data-target-game="#game-details-container" 
    data-target-team="#team-details-container">
  </api-sports-widget>

</body>
</html>
