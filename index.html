<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Beans Score</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <style>
    body { background-color: #0d0e12; font-family: 'Inter', sans-serif; color: #e0e0e0; }
    .card { border: none; border-radius: 12px; background: #16171d !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
    .card-header { text-transform: uppercase; font-size: 0.7rem; font-weight: 900; letter-spacing: 1.5px; padding: 12px 20px; border: none; }
    
    /* Tiger Comparison Bars */
    .comparison-row { margin-bottom: 12px; }
    .comparison-label { font-size: 11px; text-transform: uppercase; color: #888; display: flex; justify-content: space-between; margin-bottom: 4px; }
    .comp-bar-container { height: 6px; display: flex; background: #2d2e37; border-radius: 10px; overflow: hidden; }
    .comp-bar-home { background: #007bff; }
    .comp-bar-away { background: #dc3545; }

    /* Prediction Badges */
    .stat-tile { background: #1f2029; border-radius: 10px; padding: 12px; text-align: center; border: 1px solid #2d2e37; }
    .stat-tile strong { display: block; font-size: 1.1rem; margin-top: 5px; }
    
    #games-list, #game-content, #team-details { max-height: 85vh; overflow-y: auto; sticky; top: 20px; }
    .nav-tiger { border-bottom: 2px solid #198754; margin-bottom: 20px; background: #16171d; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark nav-tiger">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold text-success">Green Beans Score<span class="text-white">v4.0 DEEP DATA</span></span>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      
      <div class="col-lg-3">
        <div class="card">
          <div class="card-header bg-secondary">🏆 Ligi</div>
          <api-sports-widget data-type="leagues"></api-sports-widget>
        </div>
        <div class="card">
          <div class="card-header bg-dark">📅 Terminarz</div>
          <div id="games-list"><api-sports-widget data-type="games"></api-sports-widget></div>
        </div>
      </div>
      
      <div class="col-lg-5">
        <div class="card border-start border-warning border-4">
          <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
            <span>🔮 ANALIZA TYGRYSA (AI COMPARISON)</span>
            <span id="match-referee" class="badge bg-dark text-info">Sędzia: ?</span>
          </div>
          <div id="tiger-analysis" class="card-body">
            <p class="text-center text-muted">Wybierz mecz, aby uruchomić silnik analizy...</p>
          </div>
        </div>

        <div class="card">
          <div class="card-header bg-success text-white">📊 Statystyki Meczowe i Rożne</div>
          <div id="game-content" class="card-body p-0">
             <api-sports-widget data-type="game"></api-sports-widget>
          </div>
        </div>
      </div>
      
      <div class="col-lg-4">
        <div id="team-details" class="card">
          <div class="card-header bg-info text-dark">🛡️ Informacje o Klubie</div>
          <div id="team-content" class="card-body p-0">
             <p class="text-center p-4 text-muted">Kliknij herb drużyny w statystykach, aby zobaczyć skład i formę</p>
          </div>
        </div>
        <div class="card">
          <div class="card-header bg-primary">🤝 Ostatnie H2H</div>
          <div id="h2h-list" class="card-body p-0"></div>
        </div>
      </div>

    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="grey" 
    data-show-logos="true" 
    data-target-league="#games-list" 
    data-target-game="#game-content" 
    data-target-team="#team-content">
  </api-sports-widget>

  <script>
    const API_KEY = "f3c7ed02b7e08d0364bd2eb4f56ab2a5";

    document.addEventListener("DOMContentLoaded", function() {
      const gameTarget = document.querySelector('#game-content');
      let lastGid = null;

      const obs = new MutationObserver(() => {
        const w = gameTarget.querySelector('api-sports-widget');
        if(w) {
          const gid = w.getAttribute('data-game-id');
          if(gid && gid !== lastGid) {
            lastGid = gid;
            runTigerEngine(gid);
          }
        }
      });
      obs.observe(gameTarget, { childList: true, subtree: true });

      async function runTigerEngine(id) {
        const analysisBox = document.getElementById('tiger-analysis');
        const h2hBox = document.getElementById('h2h-list');
        
        try {
          const [resPred, resFix] = await Promise.all([
            fetch(`https://v3.football.api-sports.io/predictions?fixture=${id}`, { headers: {"x-apisports-key": API_KEY} }),
            fetch(`https://v3.football.api-sports.io/fixtures?id=${id}`, { headers: {"x-apisports-key": API_KEY} })
          ]);

          const pData = await resPred.json();
          const fData = await resFix.json();
          
          const p = pData.response[0];
          const f = fData.response[0];

          // Aktualizacja Sędziego
          document.getElementById('match-referee').innerText = `Sędzia: ${f.fixture.referee || 'Nieznany'}`;

          if(p) {
            const comp = p.comparison;
            analysisBox.innerHTML = `
              <div class="alert alert-dark border-warning mb-4">
                <small class="text-warning fw-bold">SUGESTIA:</small> <br><strong>${p.predictions.advice}</strong>
              </div>

              <div class="mb-4">
                ${renderBar("FORMA", comp.form.home, comp.form.away)}
                ${renderBar("ATAK", comp.att.home, comp.att.away)}
                ${renderBar("OBRONA", comp.def.home, comp.def.away)}
                ${renderBar("H2H SZANSE", comp.h2h.home, comp.h2h.away)}
              </div>

              <div class="row g-2">
                <div class="col-4"><div class="stat-tile"><small>BTTS</small><strong class="${p.predictions.btts ? 'text-success':'text-danger'}">${p.predictions.btts ? 'TAK':'NIE'}</strong></div></div>
                <div class="col-4"><div class="stat-tile"><small>U/O 2.5</small><strong>${p.predictions.under_over || '-'}</strong></div></div>
                <div class="col-4"><div class="stat-tile"><small>ROŻNE</small><strong class="text-info">${p.predictions.corners || 'Brak'}</strong></div></div>
              </div>
            `;
          }

          // H2H List
          const resH2H = await fetch(`https://v3.football.api-sports.io/fixtures/headtohead?h2h=${f.teams.home.id}-${f.teams.away.id}&last=5`, { headers: {"x-apisports-key": API_KEY} });
          const h2hData = await resH2H.json();
          h2hBox.innerHTML = h2hData.response.map(m => `
            <div class="p-2 border-bottom border-dark d-flex justify-content-between align-items-center" style="font-size:0.8rem">
              <span class="text-muted">${new Date(m.fixture.date).toLocaleDateString()}</span>
              <span>${m.teams.home.name} <strong>${m.goals.home}:${m.goals.away}</strong> ${m.teams.away.name}</span>
            </div>
          `).join('');

        } catch(e) {
          analysisBox.innerHTML = "Błąd ładowania danych .";
        }
      }

      function renderBar(label, home, away) {
        const h = parseFloat(home);
        const a = parseFloat(away);
        return `
          <div class="comparison-row">
            <div class="comparison-label"><span>${home}</span> <span>${label}</span> <span>${away}</span></div>
            <div class="comp-bar-container">
              <div class="comp-bar-home" style="width:${h}%"></div>
              <div class="comp-bar-away" style="width:${a}%"></div>
            </div>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
