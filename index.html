<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Green Beans Score | Pro Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
</head>
<body>

<nav class="navbar navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand text-success fw-bold" href="#">GREEN BEANS SCORE <small class="text-white fw-light">| BETTING ANALYTICS</small></a>
    <button class="btn btn-outline-success" onclick="location.reload()">🔄 ODŚWIEŻ DANE</button>
  </div>
</nav>

<div class="container-fluid mt-3">
  <div class="row">
    <div class="col-lg-2">
      <div class="card bg-dark text-white border-0 shadow">
        <div class="card-header border-success text-center fw-bold">LIGI</div>
        <div id="leagues-col"><api-sports-widget data-type="leagues"></api-sports-widget></div>
      </div>
    </div>
    
    <div class="col-lg-6">
      <div class="card bg-dark text-white border-0 shadow">
        <div class="card-header border-success fw-bold">DZISIEJSZE MECZE</div>
        <div class="card-body p-0" id="games-list"><api-sports-widget data-type="games"></api-sports-widget></div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card bg-dark text-white border-0 shadow sticky-top" style="top: 80px;">
        <div class="card-header border-success fw-bold">ANALIZA I KURSY</div>
        <div class="card-body p-0" id="game-target">
          <div class="p-4 text-center text-muted">Kliknij mecz, aby załadować szczegółową analizę...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<api-sports-widget 
    data-type="config" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-target-league="#leagues-col"
    data-target-game="#game-target"
    data-odds="true"
    data-show-predictions="true">
</api-sports-widget>

</body>
</html>
