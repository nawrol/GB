<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Beans Score</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body class="bg-light">
  <div class="content p-3">
    <div class="row">
      <div class="col-12 col-md-3 mb-3">
        <div id="collapseLeagues"><api-sports-widget data-type="leagues"></api-sports-widget></div>
      </div>
      
      <div class="col-12 col-md-5 mb-3">
        <div id="games-list"><api-sports-widget data-type="games"></api-sports-widget></div>
      </div>
      
      <div class="col-12 col-md-4 mb-3">
        <div id="game-target" class="card shadow-sm border-0">
           <div class="card-header bg-dark text-white fw-bold">Szczegóły, Statystyki i Kursy</div>
           <div class="card-body p-0">
               </div>
        </div>
      </div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="light" 
    data-odds="true"
    data-show-predictions="true"
    data-target-league="#games-list" 
    data-target-game="#game-target"
    data-target-odds="#game-target"> 
  </api-sports-widget>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/js/bootstrap.bundle.min.js"></script>
</body>
</html>
