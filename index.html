<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>Top 30 lig – komplet widgetów</title>
  <script type="module" src="https://widgets.api-sports.io/football/1.1.8/widget.js"></script>
</head>
<body>

<div id="wg-api-football-config"
     data-host="v3.football.api-sports.io"
     data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5"
     data-theme="dark"
     data-refresh="60"
     data-lang="pl">
</div>

<h1>TOP 30 lig – pełny komplet widgetów (sezon 2025)</h1>

<script>
const ligi = [
  {n:"Premier League", id:39},
  {n:"Championship", id:40},
  {n:"League One", id:41},
  {n:"La Liga", id:140},
  {n:"La Liga 2", id:141},
  {n:"Primera RFEF", id:142},
  {n:"Serie A", id:135},
  {n:"Serie B", id:136},
  {n:"Serie C", id:137},
  {n:"Bundesliga", id:78},
  {n:"2. Bundesliga", id:79},
  {n:"3. Liga", id:80},
  {n:"Ligue 1", id:61},
  {n:"Ligue 2", id:62},
  {n:"National", id:63},
  {n:"Eredivisie", id:88},
  {n:"Eerste Divisie", id:89},
  {n:"Tweede Divisie", id:90},
  {n:"Primeira Liga", id:94},
  {n:"Liga Portugal 2", id:95},
  {n:"Ekstraklasa", id:106},
  {n:"I Liga", id:107},
  {n:"II Liga", id:108},
  {n:"Pro League", id:144},
  {n:"Challenger Pro League", id:145},
  {n:"Premiership", id:179},
  {n:"Championship (Szkocja)", id:180},
  {n:"League One (Szkocja)", id:181},
  {n:"Super League", id:207},
  {n:"Challenge League", id:208},
  {n:"Bundesliga (Austria)", id:218},
  {n:"2. Liga (Austria)", id:219}
];

const widgety = [
  "standings",
  "topscorers",
  "topassists",
  "topclean",
  "fixtures",
  "livescore",
  "games",
  "teams",
  "players",
  "leagues"
];

document.addEventListener("DOMContentLoaded", () => {
  const root = document.body;

  ligi.forEach(l => {
    const box = document.createElement("div");
    box.innerHTML = `<h2>${l.n}</h2>`;
    widgety.forEach(w => {
      const d = document.createElement("div");
      d.setAttribute("data-type", w);
      d.setAttribute("data-league", l.id);
      if (["standings","topscorers","topassists","topclean"].includes(w)) {
        d.setAttribute("data-season", "2025");
      }
      box.appendChild(d);
    });
    root.appendChild(box);
  });
});
</script>

</body>
</html>
