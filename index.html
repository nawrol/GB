<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Beans Score</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body class="bg-light">
  <nav class="header navbar navbar-expand-lg bg-white shadow-sm sticky-top border-bottom">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <a class="navbar-brand fw-bold text-success" href="/">GREEN BEANS SCORE</a>
      <a href="https://www.siepomaga.pl/" target="_blank" rel="noopener noreferrer" class="btn btn-danger fw-bold px-4 shadow-sm">
        POMAGAMY !!
      </a>
    </div>
  </nav>

  <div class="content p-3">
    <div class="row">
      
      <div class="col-12 col-md-3 mb-3">
        <div id="leagues-card" class="card bg-white shadow-sm border-0">
          <div class="card-header bg-success text-white text-center fw-bold" data-bs-toggle="collapse" data-bs-target="#collapseLeagues" style="cursor: pointer;" title="Kliknij, aby zwinąć/rozwinąć">
            Wybierz Ligę (Zwiń/Rozwiń) ⬇
          </div>
          <div id="collapseLeagues" class="collapse show">
            <div class="card-body p-0">
              <api-sports-widget data-type="leagues"></api-sports-widget>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-md-5 mb-3">
        <div id="games-list-container" class="card bg-white shadow-sm border-0">
          <div class="card-header bg-light text-dark text-center fw-bold border-bottom">Mecze</div>
          <div class="card-body p-0">
            <div id="games-list">
              <api-sports-widget data-type="games"></api-sports-widget>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-md-4 mb-3">
        
        <div class="card bg-white shadow-sm border-0 mb-3">
          <div class="card-header bg-light text-dark text-center fw-bold border-bottom">Tabela Ligowa</div>
          <div class="card-body p-0">
            <div id="standings-content"></div>
          </div>
        </div>
        
        <div class="card bg-white shadow-sm border-0 mb-3">
          <div class="card-header bg-light text-dark text-center fw-bold border-bottom">Informacje o drużynie</div>
          <div class="card-body p-0">
            <div id="team-content"></div>
          </div>
        </div>

        <div id="game-content" class="card bg-white shadow-sm border-0">
          <div class="card-header bg-light text-dark text-center fw-bold border-bottom">Szczegóły meczu</div>
          <div class="card-body p-0">
             <api-sports-widget data-type="game"></api-sports-widget>
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="f3c7ed02b7e08d0364bd2eb4f56ab2a5" 
    data-lang="pl" 
    data-theme="light" 
    data-show-error="false" 
    data-show-logos="true" 
    data-refresh="20" 
    data-favorite="true" 
    data-player-trophies="true" 
    data-standings="true" 
    data-player-injuries="true" 
    data-team-squad="true" 
    data-team-statistics="true" 
    data-player-statistics="true" 
    data-tab="games" 
    data-game-tab="statistics" 
    data-target-player="modal" 
    data-target-league="#games-list" 
    data-target-team="#team-content" 
    data-target-game="#game-content .card-body" 
    data-target-standings="#standings-content">
  </api-sports-widget>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
